<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; background: #0f0f11; color: #fafafa;
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      user-select: none; -webkit-user-select: none;
      transition: opacity 0.3s ease;
    }
    .container { text-align: center; }
    .logo { font-size: 52px; font-weight: 700; letter-spacing: -0.03em; }
    .logo span { color: #3b82f6; }
    .bar {
      margin: 24px auto 0; width: 140px; height: 3px; border-radius: 2px;
      background: #27272a; overflow: hidden;
    }
    .bar-inner {
      width: 100%; height: 100%; background: #3b82f6; border-radius: 2px;
      animation: loading 1.6s ease-in-out infinite;
    }
    .hint {
      margin-top: 16px; font-size: 12px; color: #52525b;
      letter-spacing: 0.05em;
    }
    @keyframes loading {
      0% { transform: translateX(-100%); }
      50% { transform: translateX(0%); }
      100% { transform: translateX(100%); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Yiy<span>Note</span></div>
    <div class="bar"><div class="bar-inner"></div></div>
    <div class="hint">Starting up&hellip;</div>
  </div>
</body>
</html>
